{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card">
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <label>Username</label>
    {{ form.username }}
    <label>Password</label>
    {{ form.password }}
    <button class="btn" type="submit">Login</button>
  </form>
  <p class="muted">No account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
